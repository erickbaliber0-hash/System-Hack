<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>System Breach</title>
<style>
body {
    background: black;
    color: #00ff00;
    font-family: monospace;
    padding: 15px;
    margin: 0;
    overflow-x: hidden;
}

#terminal {
    font-size: 16px;
    line-height: 1.5;
    white-space: pre-wrap;
    margin-bottom: 15px;
    word-break: break-word;
}

#loadingBarContainer {
    width: 100%;
    background: #003300;
    border: 1px solid #00ff00;
    height: 16px;
    margin-top: 15px;
    border-radius: 4px;
    overflow: hidden;
}

#loadingBar {
    width: 0%;
    height: 100%;
    background: #00ff00;
    transition: width 0.1s linear;
}

.hackAlert {
    color: red;
    font-size: 24px;
    font-weight: bold;
    text-align: center;
    line-height: 1.2;
    margin-top: 20px;
    white-space: pre-wrap;
    animation: flicker 0.15s infinite;
    display: none;
}

@keyframes flicker {
    0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% { opacity:1; }
    20%, 22%, 24%, 55% { opacity:0; }
}

#prankPopup {
    position: fixed;
    top: 45%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: #111;
    border: 2px solid #00ff00;
    padding: 20px 30px;
    color: #00ff00;
    font-size: 18px;
    font-weight: bold;
    display: none;
    text-align: center;
    z-index: 9999;
    box-shadow: 0 0 15px #00ff00;
    animation: popupFade 0.8s ease forwards;
    max-width: 80%;
}

@keyframes popupFade {
    from {opacity:0; transform: translate(-50%, -60%);}
    to {opacity:1; transform: translate(-50%, -50%);}
}

/* Small screen adjustments */
@media (max-width: 400px) {
    #terminal {
        font-size: 14px;
    }
    .hackAlert {
        font-size: 20px;
    }
    #prankPopup {
        font-size: 16px;
        padding: 15px 20px;
    }
}
</style>
</head>
<body>

<h2 style="font-size: 18px;">Initializing System Access...</h2>
<div id="terminal"></div>

<div id="loadingBarContainer">
    <div id="loadingBar"></div>
</div>

<div id="hackAlert" class="hackAlert">
☣️☣️☣️ SYSTEM HACKED ☣️☣️☣️
</div>

<div id="prankPopup">
joke lang <br>!!!!!
</div>

<script>
const lines = [
"> Cracking System.....",
"> Blocking System......",
"> Security Blocking.....",
"> Accessing device...",
"> Access granted...",
"> Scanning files...",
"> Downloading photos...",
"> Extracting data...",
"> Installing virus.exe...",
];

let terminal = document.getElementById("terminal");
let loadingBar = document.getElementById("loadingBar");
let hackAlert = document.getElementById("hackAlert");
let prankPopup = document.getElementById("prankPopup");
let i = 0;

// Type the terminal lines
function typeLine(){
    if(i < lines.length){
        let line = lines[i];
        let j = 0;

        function typeChar() {
            if(j < line.length){
                terminal.innerHTML += line[j];
                j++;
                setTimeout(typeChar, Math.random() * 50 + 20); // faster typing for mobile
            } else {
                terminal.innerHTML += "\n";
                i++;
                setTimeout(typeLine, Math.random() * 200 + 100);
            }
        }
        typeChar();
    } else {
        fillLoadingBar();
    }
}

// Fill bottom loading bar
function fillLoadingBar(){
    let width = 0;
    let interval = setInterval(() => {
        width++;
        loadingBar.style.width = width + "%";
        if(width >= 100){
            clearInterval(interval);
            hackAlert.style.display = "block";
            setTimeout(() => {
                prankPopup.style.display = "block";
            }, 800);
        }
    }, 40);
}

typeLine();
</script>

</body>
</html>
