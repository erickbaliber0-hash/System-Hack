<!DOCTYPE html>
<html>
<head>
<title>System Breach</title>
<style>
body {
    background: black;
    color: #00ff00;
    font-family: monospace;
    padding: 20px;
    overflow-x: hidden;
}

#terminal {
    font-size: 18px;
    line-height: 1.6;
    white-space: pre-wrap;
    margin-bottom: 20px;
}

#loadingBarContainer {
    width: 100%;
    background: #003300;
    border: 1px solid #00ff00;
    height: 20px;
    margin-top: 20px;
}

#loadingBar {
    width: 0%;
    height: 100%;
    background: #00ff00;
}

.hackAlert {
    color: red;
    font-size: 32px;
    font-weight: bold;
    text-align: center;
    line-height: 1.2;
    margin-top: 30px;
    white-space: pre-wrap;
    animation: flicker 0.15s infinite;
    display: none;
}

@keyframes flicker {
    0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% { opacity:1; }
    20%, 22%, 24%, 55% { opacity:0; }
}

#prankPopup {
    position: fixed;
    top: 40%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: #111;
    border: 2px solid #00ff00;
    padding: 30px 50px;
    color: #00ff00;
    font-size: 24px;
    font-weight: bold;
    display: none;
    text-align: center;
    z-index: 9999;
    box-shadow: 0 0 20px #00ff00;
    animation: popupFade 1s ease forwards;
}

@keyframes popupFade {
    from {opacity:0; transform: translate(-50%, -60%);}
    to {opacity:1; transform: translate(-50%, -50%);}
}
</style>
</head>

<body>

<h2>Initializing System Access...</h2>
<div id="terminal"></div>

<div id="loadingBarContainer">
    <div id="loadingBar"></div>
</div>

<div id="hackAlert" class="hackAlert">
☣️☣️☣️ SYSTEM HACKED ☣️☣️☣️
</div>

<div id="prankPopup">
joke lang <br>!!!!!
</div>

<script>
const lines = [
"> Cracking System.....",
"> Bloking System......",
"> Security Bloking.....",
"> Accessing device...",
"> Access granted...",
"> Scanning files...",
"> Downloading photos...",
"> extractingg...",
"> Installing virus.exe...",
];

let terminal = document.getElementById("terminal");
let loadingBar = document.getElementById("loadingBar");
let hackAlert = document.getElementById("hackAlert");
let prankPopup = document.getElementById("prankPopup");
let i = 0;

// Type the terminal lines
function typeLine(){
    if(i < lines.length){
        let line = lines[i];
        let j = 0;

        function typeChar() {
            if(j < line.length){
                terminal.innerHTML += line[j];
                j++;
                setTimeout(typeChar, Math.random() * 80 + 20);
            } else {
                terminal.innerHTML += "\n";
                i++;
                setTimeout(typeLine, Math.random() * 400 + 200);
            }
        }
        typeChar();
    } else {
        // After lines, start overall loading bar
        fillLoadingBar();
    }
}

// Fill bottom loading bar
function fillLoadingBar(){
    let width = 0;
    let interval = setInterval(() => {
        width++;
        loadingBar.style.width = width + "%";
        if(width >= 100){
            clearInterval(interval);
            // Show dramatic SYSTEM HACKED alert
            hackAlert.style.display = "block";
            // Show prank popup after short delay
            setTimeout(() => {
                prankPopup.style.display = "block";
            }, 1000);
        }
    }, 50);
}

typeLine();
</script>

</body>
  </html>
